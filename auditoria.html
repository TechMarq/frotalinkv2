<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoria de Atividades | FrotaLink</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="orb_menu.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --accent: #f59e0b;
            --bg-main: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.5);
            --bg-hover: rgba(255, 255, 255, 0.05);
            --border-card: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --radius: 16px;
        }

        body {
            background: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            background-image:
                radial-gradient(at 0% 0%, hsla(253, 16%, 7%, 1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(225, 39%, 30%, 1) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(339, 49%, 30%, 1) 0, transparent 50%);
            background-attachment: fixed;
            padding-bottom: 2rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            margin-top: 1rem;
        }

        .header-title h1 {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-title p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.2rem;
        }

        .audit-card {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: var(--radius);
            padding: 1.5rem;
            backdrop-filter: blur(12px);
            margin-bottom: 1.5rem;
        }

        /* Filter Panel */
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            align-items: flex-end;
            margin-bottom: 1.5rem;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .filter-group label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .filter-group select,
        .filter-group input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-card);
            border-radius: 10px;
            color: white;
            padding: 0.7rem 1rem;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .filter-group select:focus,
        .filter-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        /* Table & Timeline */
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            padding: 1rem 0.8rem;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            border-bottom: 2px solid var(--border-card);
        }

        td {
            padding: 1rem 0.8rem;
            font-size: 0.88rem;
            border-bottom: 1px solid var(--border-card);
            color: #f1f5f9;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        /* Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-inclusao {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .badge-alteracao {
            background: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .badge-exclusao {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .badge-importacao {
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .badge-limpeza {
            background: rgba(139, 92, 246, 0.15);
            color: #c084fc;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .badge-default {
            background: rgba(148, 163, 184, 0.15);
            color: #cbd5e1;
            border: 1px solid rgba(148, 163, 184, 0.3);
        }

        .badge-modulo {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #e2e8f0;
            font-weight: 600;
        }

        /* Pagination style */
        .pagination-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.5rem;
        }

        .pagination-info {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .pagination-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .btn-page {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid var(--border-card);
            color: white;
            padding: 0.5rem 0.8rem;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .btn-page:hover:not(:disabled) {
            background: var(--primary);
            border-color: var(--primary);
        }

        .btn-page:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
            text-align: center;
        }

        .empty-state i {
            margin-bottom: 1rem;
            color: var(--primary-light);
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <script src="config.js"></script>
    <script src="orb_menu.js" defer></script>
</head>
<body>

    <div class="container">
        <header>
            <div class="header-title">
                <a href="home.html" style="display: flex; align-items: center; gap: 0.5rem; color: var(--text-muted); text-decoration: none; font-weight: 600; font-size: 0.85rem; margin-bottom: 0.8rem; transition: color 0.3s;" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text-muted)'">
                    <i data-lucide="chevron-left" style="width: 16px; height: 16px;"></i> Voltar ao Painel
                </a>
                <h1>Registro de Auditoria</h1>
                <p>Monitoramento e histórico de interações de usuários e administradores</p>
            </div>
            <!-- Botão de limpeza removido para segurança (apenas proprietários do banco de dados podem gerenciar registros) -->
        </header>

        <div class="audit-card">
            <!-- Filter Section -->
            <div class="filter-grid">
                <div class="filter-group">
                    <label for="auditSearch">Pesquisa Livre</label>
                    <input type="text" id="auditSearch" placeholder="Usuário, descrição, veículo..." oninput="handleFilterChange()">
                </div>
                <div class="filter-group">
                    <label for="auditModule">Módulo</label>
                    <select id="auditModule" onchange="handleFilterChange()">
                        <option value="">Todos os Módulos</option>
                        <option value="abastecimento">Abastecimento</option>
                        <option value="manutencao">Manutenção</option>
                        <option value="financeiro">Financeiro</option>
                        <option value="compras">Compras</option>
                        <option value="estoque">Estoque</option>
                        <option value="comercial">Comercial</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="auditAction">Ação</label>
                    <select id="auditAction" onchange="handleFilterChange()">
                        <option value="">Todas as Ações</option>
                        <option value="INCLUSÃO">Inclusão</option>
                        <option value="ALTERAÇÃO">Alteração</option>
                        <option value="EXCLUSÃO">Exclusão</option>
                        <option value="EXCLUSÃO EM LOTE">Exclusão em Lote</option>
                        <option value="IMPORTAÇÃO">Importação</option>
                        <option value="LIMPEZA ALERTA">Limpeza de Alerta</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="auditStartDate">Data Início</label>
                    <input type="date" id="auditStartDate" onchange="handleFilterChange()">
                </div>
                <div class="filter-group">
                    <label for="auditEndDate">Data Fim</label>
                    <input type="date" id="auditEndDate" onchange="handleFilterChange()">
                </div>
            </div>

            <!-- Table Section -->
            <div style="overflow-x: auto;">
                <table id="auditTable">
                    <thead>
                        <tr>
                            <th style="width: 180px;">Data / Hora</th>
                            <th style="width: 250px;">Usuário</th>
                            <th style="width: 150px;">Módulo</th>
                            <th style="width: 180px;">Ação</th>
                            <th>Descrição</th>
                        </tr>
                    </thead>
                    <tbody id="auditList">
                        <!-- Filled by JS -->
                    </tbody>
                </table>
            </div>

            <!-- Pagination Section -->
            <div class="pagination-container">
                <div class="pagination-info" id="paginationInfo">
                    Mostrando 0-0 de 0 registros
                </div>
                <div class="pagination-buttons">
                    <button class="btn-page" id="btnPrevPage" onclick="prevPage()" disabled>
                        <i data-lucide="chevron-left" style="width: 16px;"></i> Anterior
                    </button>
                    <button class="btn-page" id="btnNextPage" onclick="nextPage()" disabled>
                        Próximo <i data-lucide="chevron-right" style="width: 16px;"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Loaded JS -->
    <script src="auditoria.js"></script>
</body>
</html>
